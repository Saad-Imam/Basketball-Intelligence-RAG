name: Sync to Hugging Face Space

on:
  push:
    branches:
      - main

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout full repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # IMPORTANT: keeps history

      - name: Configure Git
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"

      - name: Remove corpus for deployment
        run: |
          git rm -r --cached corpus || true
          rm -rf corpus

      - name: Commit removal (deployment only)
        run: |
          git add .
          git commit -m "Deploy version without corpus" || echo "No changes"

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add hf https://saadimam:${HF_TOKEN}@huggingface.co/spaces/saadimam/Basketball-Intelligence-RAG
          git push hf main --force