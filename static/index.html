<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Basketball AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:        #0d0f11;
      --surface:   #161a1f;
      --surface2:  #1e242b;
      --border:    #272d35;
      --accent:    #e8872a;
      --accent2:   #c45f0a;
      --text:      #d8dde3;
      --text-dim:  #6b7480;
      --text-faint:#3a424c;
      --green:     #3ecf8e;
      --red:       #e05c5c;
      --radius:    6px;
      --font-head: 'Bebas Neue', sans-serif;
      --font-body: 'Libre Baskerville', Georgia, serif;
      --font-mono: 'JetBrains Mono', monospace;
      --transition: 180ms cubic-bezier(.4,0,.2,1);
    }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.65;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }
    #shell {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    #topbar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 24px;
      height: 48px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    #status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--text-faint);
      transition: background var(--transition);
    }
    #status-dot.ready { background: var(--green); box-shadow: 0 0 6px var(--green); }
    #status-dot.busy  { background: var(--accent); box-shadow: 0 0 6px var(--accent); animation: pulse 1s infinite; }
    #status-dot.error { background: var(--red); }
    #status-label {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-right: 8px;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    #main { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
    #convo {
      flex: 1;
      overflow-y: auto;
      padding: 32px clamp(24px, 8vw, 120px);
      display: flex;
      flex-direction: column;
      gap: 32px;
    }
    #convo::-webkit-scrollbar { width: 4px; }
    #convo::-webkit-scrollbar-track { background: transparent; }
    #convo::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    #welcome {
      margin: auto;
      text-align: center;
      animation: fadeUp 600ms ease both;
    }
    @keyframes fadeUp {
      from { opacity:0; transform: translateY(20px); }
      to   { opacity:1; transform: translateY(0); }
    }
    #logo-lockup {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }
    #ball-wrap {
      width: 90px;
      height: 110px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      flex-shrink: 0;
    }
    #ball-wrap svg {
      width: 90px;
      height: 90px;
      animation: bounce 0.72s cubic-bezier(.33,0,.66,1) infinite alternate;
      transform-origin: center bottom;
    }
    @keyframes bounce {
      0%   { transform: translateY(0)    scaleY(1)   scaleX(1); }
      85%  { transform: translateY(18px) scaleY(1)   scaleX(1); }
      100% { transform: translateY(18px) scaleY(.82) scaleX(1.14); }
    }
    #ball-shadow {
      width: 60px; height: 10px;
      background: radial-gradient(ellipse, rgba(232,135,42,.35) 0%, transparent 70%);
      border-radius: 50%;
      animation: shadow-pulse 0.72s cubic-bezier(.33,0,.66,1) infinite alternate;
    }
    @keyframes shadow-pulse {
      0%   { transform: scaleX(1);   opacity: .5; }
      85%  { transform: scaleX(.75); opacity: .2; }
      100% { transform: scaleX(1.2); opacity: .7; }
    }
    #ai-text {
      font-family: var(--font-head);
      font-size: 96px;
      line-height: 1;
      letter-spacing: 6px;
      color: var(--accent);
      text-shadow: 0 0 40px rgba(232,135,42,.25), 0 2px 0 rgba(0,0,0,.6);
      user-select: none;
    }
    #welcome .tagline {
      margin-top: 22px;
      font-size: 13px;
      color: var(--text-dim);
      font-style: italic;
      letter-spacing: .3px;
    }
    .turn { animation: fadeUp 300ms ease both; max-width: 780px; width: 100%; margin: 0 auto; }
    .turn-query {
      font-family: var(--font-head);
      font-size: 20px;
      letter-spacing: 1.5px;
      color: var(--text);
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: baseline;
      gap: 10px;
    }
    .turn-query::before {
      content: 'Q';
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--accent);
      letter-spacing: 2px;
      padding: 2px 6px;
      border: 1px solid var(--accent);
      border-radius: 3px;
      flex-shrink: 0;
    }
    .turn-answer { margin-top: 16px; font-size: 14.5px; line-height: 1.8; color: var(--text); }
    .turn-answer .cite {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--accent);
      border: 1px solid var(--accent);
      border-radius: 3px;
      padding: 1px 5px;
      margin: 0 2px;
      vertical-align: middle;
    }
    .turn-meta {
      margin-top: 12px;
      display: flex;
      gap: 16px;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-faint);
    }
    .turn-meta span { display: flex; align-items: center; gap: 4px; }
    .turn-meta .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--text-faint); }
    .skeleton-line {
      height: 14px;
      background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 3px;
      margin-bottom: 10px;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    #input-bar {
      padding: 16px clamp(24px, 8vw, 120px) 24px;
      background: var(--bg);
      border-top: 1px solid var(--border);
    }
    #input-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      max-width: 780px;
      margin: 0 auto;
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    #input-wrap:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(232,135,42,.12);
    }
    #query-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      font-family: var(--font-body);
      font-size: 14px;
      color: var(--text);
      resize: none;
      max-height: 120px;
      line-height: 1.5;
    }
    #query-input::placeholder { color: var(--text-faint); font-style: italic; }
    #send-btn {
      flex-shrink: 0;
      width: 36px; height: 36px;
      background: var(--accent);
      border: none;
      border-radius: 6px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background var(--transition), transform var(--transition);
    }
    #send-btn:hover:not(:disabled) { background: var(--accent2); transform: scale(1.05); }
    #send-btn:disabled { background: var(--text-faint); cursor: not-allowed; transform: none; }
    #send-btn svg { width: 16px; height: 16px; fill: #fff; }
    #hint {
      margin-top: 8px;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-faint);
      text-align: center;
    }
    * { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
    @media (max-width: 600px) {
      #ai-text { font-size: 64px; }
      #ball-wrap, #ball-wrap svg { width: 60px; height: 60px; }
    }
  </style>
</head>
<body>
<div id="shell">
  <header id="topbar">
    <div id="status-label">INITIALISING</div>
    <div id="status-dot"></div>
  </header>

  <main id="main">
    <div id="convo">
      <div id="welcome">
        <div id="logo-lockup">
          <div id="ball-wrap">
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <radialGradient id="ballGrad" cx="38%" cy="35%" r="60%">
                  <stop offset="0%"   stop-color="#f5a94e"/>
                  <stop offset="55%"  stop-color="#e8872a"/>
                  <stop offset="100%" stop-color="#7a3a06"/>
                </radialGradient>
                <radialGradient id="specular" cx="35%" cy="30%" r="30%">
                  <stop offset="0%"   stop-color="rgba(255,255,255,.22)"/>
                  <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
                </radialGradient>
                <clipPath id="ballClip">
                  <circle cx="50" cy="50" r="46"/>
                </clipPath>
              </defs>
              <circle cx="50" cy="50" r="46" fill="url(#ballGrad)"/>
              <g clip-path="url(#ballClip)" fill="none" stroke="#7a3a06" stroke-width="2.4" stroke-linecap="round">
                <path d="M50 4 Q62 50 50 96"/>
                <path d="M50 4 Q38 50 50 96"/>
                <path d="M4 50 Q50 62 96 50"/>
                <path d="M4 50 Q50 38 96 50"/>
              </g>
              <circle cx="50" cy="50" r="46" fill="url(#specular)"/>
            </svg>
            <div id="ball-shadow"></div>
          </div>
          <div id="ai-text">AI</div>
        </div>
        <div class="tagline">Ask anything about NBA &amp; FIBA rules, tactics, or strategy.</div>
      </div>
    </div>

    <div id="input-bar">
      <div id="input-wrap">
        <textarea id="query-input" rows="1" placeholder="Ask a question about basketball rules or strategy…"></textarea>
        <button id="send-btn" onclick="sendQuery()" title="Send (Enter)">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
      </div>
      <div id="hint">Enter to send &nbsp;·&nbsp; Shift+Enter for new line</div>
    </div>
  </main>
</div>

<script>
  const convo     = document.getElementById('convo');
  const welcome   = document.getElementById('welcome');
  const input     = document.getElementById('query-input');
  const sendBtn   = document.getElementById('send-btn');
  const statusDot = document.getElementById('status-dot');
  const statusLbl = document.getElementById('status-label');
  let busy = false;

  async function checkHealth() {
    try {
      const r = await fetch('/api/health');
      setStatus(r.ok ? 'ready' : 'error', r.ok ? 'READY' : 'ERROR');
    } catch { setStatus('error', 'OFFLINE'); }
  }
  checkHealth();

  function setStatus(cls, label) {
    statusDot.className = '';
    statusDot.classList.add(cls);
    statusLbl.textContent = label;
  }

  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  });

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendQuery(); }
  });

  async function sendQuery() {
    const query = input.value.trim();
    if (!query || busy) return;
    busy = true;
    sendBtn.disabled = true;
    setStatus('busy', 'THINKING');
    if (welcome) welcome.style.display = 'none';

    const turn = document.createElement('div');
    turn.className = 'turn';
    turn.innerHTML = `
      <div class="turn-query">${escHtml(query)}</div>
      <div class="turn-answer" id="answer-loading">
        <div class="skeleton-line" style="width:92%"></div>
        <div class="skeleton-line" style="width:78%"></div>
        <div class="skeleton-line" style="width:85%"></div>
        <div class="skeleton-line" style="width:60%"></div>
      </div>`;
    convo.appendChild(turn);
    scrollDown();
    input.value = '';
    input.style.height = 'auto';

    try {
      const res = await fetch('/api/ask', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query, top_k: 5 }),
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({ detail: res.statusText }));
        throw new Error(err.detail || 'Server error');
      }
      const data = await res.json();
      const answerEl = turn.querySelector('#answer-loading');
      answerEl.id = '';
      answerEl.innerHTML = formatAnswer(data.answer);
      const meta = document.createElement('div');
      meta.className = 'turn-meta';
      meta.innerHTML = `
        <span><span class="dot"></span>Retrieval ${data.retrieval_ms}ms</span>
        <span><span class="dot"></span>Generation ${data.generation_ms}ms</span>
        <span><span class="dot"></span>${data.sources.length} sources</span>`;
      turn.appendChild(meta);
      setStatus('ready', 'READY');
    } catch (err) {
      const answerEl = turn.querySelector('#answer-loading') || turn.querySelector('.turn-answer');
      if (answerEl) answerEl.innerHTML = `<span style="color:var(--red)">Error: ${escHtml(err.message)}</span>`;
      setStatus('error', 'ERROR');
    }
    busy = false;
    sendBtn.disabled = false;
    scrollDown();
  }

  function formatAnswer(text) {
    return escHtml(text).replace(
      /\[Source\s?(\d+)\]/gi,
      (_, n) => `<span class="cite">[Source ${n}]</span>`
    );
  }

  function escHtml(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  function scrollDown() {
    convo.scrollTo({ top: convo.scrollHeight, behavior: 'smooth' });
  }
</script>
</body>
</html>
