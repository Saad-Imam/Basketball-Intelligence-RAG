<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Basketball AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:        #0d0f11;
      --surface:   #161a1f;
      --surface2:  #1e242b;
      --border:    #272d35;
      --accent:    #e8872a;
      --accent2:   #c45f0a;
      --text:      #d8dde3;
      --text-dim:  #6b7480;
      --text-faint:#3a424c;
      --green:     #3ecf8e;
      --red:       #e05c5c;
      --yellow:    #f5c842;
      --radius:    6px;
      --font-head: 'Bebas Neue', sans-serif;
      --font-body: 'Libre Baskerville', Georgia, serif;
      --font-mono: 'JetBrains Mono', monospace;
      --transition: 180ms cubic-bezier(.4,0,.2,1);
      --panel-w:   380px;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-body); font-size: 15px; line-height: 1.65; overflow: hidden; }
    body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events: none; z-index: 0; }

    #shell { position: relative; z-index: 1; display: flex; flex-direction: column; height: 100vh; }
    #topbar { display: flex; align-items: center; justify-content: flex-end; padding: 0 24px; height: 48px; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; z-index: 10; gap: 12px; }

    #eval-btn { display: flex; align-items: center; gap: 7px; background: none; border: 1px solid var(--border); border-radius: 5px; padding: 5px 12px; cursor: pointer; font-family: var(--font-mono); font-size: 10px; letter-spacing: 1px; color: var(--text-dim); text-transform: uppercase; transition: border-color var(--transition), color var(--transition); }
    #eval-btn:hover { border-color: var(--accent); color: var(--accent); }
    #eval-btn:disabled { opacity: .35; cursor: not-allowed; }
    #eval-btn svg { width: 13px; height: 13px; fill: currentColor; }

    #status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-faint); transition: background var(--transition); }
    #status-dot.ready { background: var(--green); box-shadow: 0 0 6px var(--green); }
    #status-dot.busy  { background: var(--accent); box-shadow: 0 0 6px var(--accent); animation: pulse 1s infinite; }
    #status-dot.error { background: var(--red); }
    #status-label { font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    #main { display: flex; flex: 1; overflow: hidden; position: relative; }
    #chat-col { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
    #convo { flex: 1; overflow-y: auto; padding: 32px clamp(24px, 8vw, 120px); display: flex; flex-direction: column; gap: 32px; }
    #convo::-webkit-scrollbar { width: 4px; }
    #convo::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    #welcome { margin: auto; text-align: center; animation: fadeUp 600ms ease both; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    #logo-lockup { display: flex; align-items: center; justify-content: center; gap: 20px; }
    #ball-wrap { width: 90px; height: 110px; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; flex-shrink: 0; }
    #ball-wrap svg { width: 90px; height: 90px; animation: bounce 0.72s cubic-bezier(.33,0,.66,1) infinite alternate; transform-origin: center bottom; }
    @keyframes bounce { 0%{transform:translateY(0) scaleY(1) scaleX(1)} 85%{transform:translateY(18px) scaleY(1) scaleX(1)} 100%{transform:translateY(18px) scaleY(.82) scaleX(1.14)} }
    #ball-shadow { width: 60px; height: 10px; background: radial-gradient(ellipse, rgba(232,135,42,.35) 0%, transparent 70%); border-radius: 50%; animation: shadow-pulse 0.72s cubic-bezier(.33,0,.66,1) infinite alternate; }
    @keyframes shadow-pulse { 0%{transform:scaleX(1);opacity:.5} 85%{transform:scaleX(.75);opacity:.2} 100%{transform:scaleX(1.2);opacity:.7} }
    #ai-text { font-family: var(--font-head); font-size: 96px; line-height: 1; letter-spacing: 6px; color: var(--accent); text-shadow: 0 0 40px rgba(232,135,42,.25), 0 2px 0 rgba(0,0,0,.6); user-select: none; }
    #welcome .tagline { margin-top: 22px; font-size: 13px; color: var(--text-dim); font-style: italic; }

    .turn { animation: fadeUp 300ms ease both; max-width: 780px; width: 100%; margin: 0 auto; }
    .turn-query { font-family: var(--font-head); font-size: 20px; letter-spacing: 1.5px; color: var(--text); padding-bottom: 12px; border-bottom: 1px solid var(--border); display: flex; align-items: baseline; gap: 10px; }
    .turn-query::before { content: 'Q'; font-size: 11px; font-family: var(--font-mono); color: var(--accent); letter-spacing: 2px; padding: 2px 6px; border: 1px solid var(--accent); border-radius: 3px; flex-shrink: 0; }
    .turn-answer { margin-top: 16px; font-size: 14.5px; line-height: 1.8; color: var(--text); white-space: pre-wrap; }
    .turn-answer strong { color: var(--accent); font-weight: 700; letter-spacing: 0.5px; }    .cite { font-family: var(--font-mono); font-size: 10px; color: var(--accent); border: 1px solid var(--accent); border-radius: 3px; padding: 1px 5px; margin: 0 2px; vertical-align: middle; cursor: pointer; background: transparent; transition: background var(--transition), color var(--transition); display: inline-block; }
    .cite:hover, .cite.active { background: var(--accent); color: #000; }

    .source-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; }
    .source-chip { display: flex; align-items: center; gap: 8px; background: var(--surface); border: 1px solid var(--border); border-radius: 5px; padding: 6px 10px; cursor: pointer; transition: border-color var(--transition), background var(--transition); max-width: 260px; text-align: left; }
    .source-chip:hover, .source-chip.active { border-color: var(--accent); background: var(--surface2); }
    .chip-num { font-family: var(--font-mono); font-size: 10px; color: var(--accent); border: 1px solid var(--accent); border-radius: 3px; padding: 1px 5px; flex-shrink: 0; }
    .chip-label { font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .eval-strip { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; animation: fadeUp 300ms ease both; }
    .eval-card { flex: 1; min-width: 140px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 14px; position: relative; transition: border-color var(--transition), transform var(--transition); }
    .eval-card.clickable { cursor: pointer; }
    .eval-card.clickable:hover { border-color: var(--accent); transform: translateY(-2px); }
    .eval-card.clickable::after { content: 'DETAILS ↗'; position: absolute; top: 10px; right: 12px; font-family: var(--font-mono); font-size: 7px; color: var(--accent); opacity: 0.6; letter-spacing: 0.5px; }

    .eval-card-label { font-family: var(--font-mono); font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-faint); margin-bottom: 4px; }
    .eval-card-score { font-family: var(--font-mono); font-size: 22px; font-weight: 500; }
    .eval-card-score.good { color: var(--green); }
    .eval-card-score.mid  { color: var(--yellow); }
    .eval-card-score.poor { color: var(--red); }
    .eval-card-sub { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
    .eval-bar-wrap { height: 3px; background: var(--border); border-radius: 2px; margin-top: 8px; overflow: hidden; }
    .eval-bar { height: 100%; border-radius: 2px; transition: width 600ms cubic-bezier(.4,0,.2,1); }
    .eval-bar.good { background: var(--green); }
    .eval-bar.mid  { background: var(--yellow); }
    .eval-bar.poor { background: var(--red); }

    .turn-meta { margin-top: 12px; display: flex; gap: 16px; font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); flex-wrap: wrap; }
    .turn-meta span { display: flex; align-items: center; gap: 4px; }
    .turn-meta .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--text-faint); }
    .skeleton-line { height: 14px; background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 3px; margin-bottom: 10px; }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    #input-bar { padding: 16px clamp(24px, 8vw, 120px) 24px; background: var(--bg); border-top: 1px solid var(--border); }
    #input-wrap { display: flex; align-items: center; gap: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; max-width: 780px; margin: 0 auto; transition: border-color var(--transition), box-shadow var(--transition); }
    #input-wrap:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(232,135,42,.12); }
    #query-input { flex: 1; background: none; border: none; outline: none; font-family: var(--font-body); font-size: 14px; color: var(--text); resize: none; max-height: 120px; line-height: 1.5; }
    #query-input::placeholder { color: var(--text-faint); font-style: italic; }
    #send-btn { flex-shrink: 0; width: 36px; height: 36px; background: var(--accent); border: none; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background var(--transition), transform var(--transition); }
    #send-btn:hover:not(:disabled) { background: var(--accent2); transform: scale(1.05); }
    #send-btn:disabled { background: var(--text-faint); cursor: not-allowed; transform: none; }
    #send-btn svg { width: 16px; height: 16px; fill: #fff; }
    #hint { margin-top: 8px; font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); text-align: center; }

    #panel-backdrop { display: none; position: fixed; inset: 0; z-index: 50; background: rgba(0,0,0,.45); backdrop-filter: blur(2px); }
    #panel-backdrop.open { display: block; animation: fadein 200ms ease both; }
    @keyframes fadein { from{opacity:0} to{opacity:1} }
    #source-panel { position: fixed; top: 0; left: 0; bottom: 0; width: var(--panel-w); z-index: 51; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; transform: translateX(-100%); transition: transform 300ms cubic-bezier(.4,0,.2,1); box-shadow: 4px 0 32px rgba(0,0,0,.5); }
    #source-panel.open { transform: translateX(0); }
    #panel-header { display: flex; align-items: center; justify-content: space-between; padding: 0 20px; height: 48px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    #panel-title { font-family: var(--font-head); font-size: 16px; letter-spacing: 2px; color: var(--accent); }
    #panel-close { width: 28px; height: 28px; background: none; border: 1px solid var(--border); border-radius: 4px; cursor: pointer; color: var(--text-dim); display: flex; align-items: center; justify-content: center; font-size: 16px; transition: border-color var(--transition), color var(--transition); }
    #panel-close:hover { border-color: var(--text-dim); color: var(--text); }
    #panel-tabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .p-tab { flex: 1; padding: 10px 0; text-align: center; font-family: var(--font-mono); font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-faint); cursor: pointer; border-bottom: 2px solid transparent; transition: color var(--transition), border-color var(--transition); }
    .p-tab:hover { color: var(--text-dim); }
    .p-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    #panel-body { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
    .info-block { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
    .info-label { font-family: var(--font-mono); font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-faint); margin-bottom: 5px; }
    .info-value { font-size: 13px; color: var(--text); line-height: 1.5; }
    .info-value.mono { font-family: var(--font-mono); font-size: 12px; }
    .score-row { display: flex; gap: 10px; }
    .score-block { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; }
    .score-num { font-family: var(--font-mono); font-size: 20px; color: var(--accent); font-weight: 500; }
    .score-bar-wrap { height: 3px; background: var(--border); border-radius: 2px; margin-top: 8px; overflow: hidden; }
    .score-bar { height: 100%; background: var(--accent); border-radius: 2px; transition: width 500ms cubic-bezier(.4,0,.2,1); }
    #pane-info { display: none; flex-direction: column; gap: 12px; }
    #pane-info.active { display: flex; }
    #pane-text { display: none; }
    #pane-text.active { display: block; }
    .chunk-text-box { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; font-size: 13px; line-height: 1.8; color: var(--text); white-space: pre-wrap; word-break: break-word; }
    #panel-nav { display: flex; align-items: center; justify-content: space-between; padding: 10px 20px; border-top: 1px solid var(--border); flex-shrink: 0; }
    .nav-btn { background: none; border: 1px solid var(--border); border-radius: 4px; color: var(--text-dim); font-family: var(--font-mono); font-size: 11px; padding: 5px 12px; cursor: pointer; transition: border-color var(--transition), color var(--transition); }
    .nav-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
    .nav-btn:disabled { opacity: .3; cursor: not-allowed; }
    #nav-counter { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); }

    #eval-modal-wrap { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,.7); backdrop-filter: blur(6px); align-items: center; justify-content: center; }
    #eval-modal-wrap.open { display: flex; animation: fadein 200ms ease both; }
    #eval-modal { width: min(760px, 95vw); max-height: 90vh; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; display: flex; flex-direction: column; box-shadow: 0 24px 80px rgba(0,0,0,.6); overflow: hidden; }
    #eval-modal-header { display: flex; align-items: center; justify-content: space-between; padding: 0 24px; height: 56px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    #eval-modal-title { font-family: var(--font-head); font-size: 18px; letter-spacing: 2px; color: var(--accent); }
    #eval-modal-close { width: 28px; height: 28px; background: none; border: 1px solid var(--border); border-radius: 4px; cursor: pointer; color: var(--text-dim); display: flex; align-items: center; justify-content: center; font-size: 16px; transition: border-color var(--transition), color var(--transition); }
    #eval-modal-close:hover:not(:disabled) { border-color: var(--text-dim); color: var(--text); }
    #eval-modal-close:disabled { opacity: .3; cursor: not-allowed; }
    #eval-progress-bar-wrap { height: 3px; background: var(--border); flex-shrink: 0; }
    #eval-progress-bar { height: 100%; background: var(--accent); width: 0%; transition: width 400ms ease; }
    #eval-current { padding: 14px 24px; border-bottom: 1px solid var(--border); flex-shrink: 0; min-height: 58px; display: flex; align-items: center; gap: 14px; }
    #eval-spinner { width: 26px; height: 26px; flex-shrink: 0; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    #eval-spinner.done { border-color: var(--green); border-top-color: var(--green); animation: none; }
    @keyframes spin { to{transform:rotate(360deg)} }
    #eval-current-text { font-family: var(--font-mono); font-size: 11px; color: var(--text-dim); line-height: 1.5; flex: 1; }
    #eval-current-counter { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); flex-shrink: 0; }
    #eval-results-area { flex: 1; overflow-y: auto; padding: 14px 24px; display: flex; flex-direction: column; gap: 10px; }
    #eval-results-area::-webkit-scrollbar { width: 3px; }
    #eval-results-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .eval-row { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; animation: fadeUp 300ms ease both; }
    .eval-row-header { display: flex; align-items: center; gap: 10px; padding: 10px 14px; cursor: pointer; transition: background var(--transition); }
    .eval-row-header:hover { background: rgba(255,255,255,.02); }
    .eval-row-num { font-family: var(--font-mono); font-size: 10px; color: var(--accent); border: 1px solid var(--accent); border-radius: 3px; padding: 1px 6px; flex-shrink: 0; }
    .eval-row-query { font-family: var(--font-mono); font-size: 11px; color: var(--text); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .eval-score-badge { font-family: var(--font-mono); font-size: 10px; padding: 2px 7px; border-radius: 3px; flex-shrink: 0; }
    .eval-score-badge.faith { background: rgba(62,207,142,.12); color: var(--green); border: 1px solid rgba(62,207,142,.3); }
    .eval-score-badge.rel   { background: rgba(232,135,42,.12); color: var(--accent); border: 1px solid rgba(232,135,42,.3); }
    .eval-row-body { display: none; padding: 0 14px 12px; }
    .eval-row-body.open { display: block; }
    .eval-row-answer { font-size: 12px; line-height: 1.7; color: var(--text-dim); margin-bottom: 10px; border-left: 2px solid var(--border); padding-left: 10px; }
    .eval-mini-label { font-family: var(--font-mono); font-size: 9px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-faint); margin: 8px 0 4px; }
    .eval-claim-row { display: flex; align-items: flex-start; gap: 6px; font-size: 11px; line-height: 1.5; color: var(--text-dim); margin-bottom: 3px; }
    .eval-claim-icon { flex-shrink: 0; font-size: 11px; margin-top: 1px; }
    .eval-claim-icon.yes { color: var(--green); }
    .eval-claim-icon.no  { color: var(--red); }
    .eval-question-row { font-size: 11px; color: var(--text-dim); margin-bottom: 3px; display: flex; justify-content: space-between; gap: 8px; }
    .eval-question-sim { font-family: var(--font-mono); font-size: 10px; color: var(--accent); flex-shrink: 0; }

    #eval-summary { display: none; border-top: 1px solid var(--border); padding: 16px 24px; flex-shrink: 0; }
    #eval-summary.show { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
    .summary-stat { display: flex; flex-direction: column; gap: 2px; }
    .summary-stat-label { font-family: var(--font-mono); font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-faint); }
    .summary-stat-val { font-family: var(--font-mono); font-size: 24px; font-weight: 500; }
    .summary-sep { width: 1px; height: 36px; background: var(--border); }
    .summary-note { font-size: 12px; color: var(--text-dim); font-style: italic; flex: 1; }

    /* ── CLAIMS DETAIL MODAL (NEW) ── */
    #claims-popup-wrap { display: none; position: fixed; inset: 0; z-index: 110; background: rgba(0,0,0,.75); backdrop-filter: blur(4px); align-items: center; justify-content: center; }
    #claims-popup-wrap.open { display: flex; animation: fadein 200ms ease both; }
    #claims-popup { width: min(640px, 90vw); max-height: 75vh; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; display: flex; flex-direction: column; box-shadow: 0 32px 64px rgba(0,0,0,.6); }
    #claims-popup-header { display: flex; align-items: center; justify-content: space-between; padding: 0 24px; height: 60px; border-bottom: 1px solid var(--border); }
    #claims-popup-title { font-family: var(--font-head); font-size: 20px; letter-spacing: 2px; color: var(--accent); }
    #claims-popup-close { width: 30px; height: 30px; background: none; border: 1px solid var(--border); border-radius: 5px; color: var(--text-dim); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; }
    #claims-popup-body { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 20px; }
    .claim-detail-item { display: flex; gap: 16px; align-items: flex-start; }
    .claim-badge { flex-shrink: 0; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-size: 11px; font-weight: bold; }
    .claim-badge.supported { background: rgba(62,207,142,.15); color: var(--green); border: 1px solid var(--green); }
    .claim-badge.not-supported { background: rgba(224,92,92,.15); color: var(--red); border: 1px solid var(--red); }
    .claim-content { flex: 1; display: flex; flex-direction: column; gap: 6px; }
    .claim-text-main { font-size: 14px; color: var(--text); font-weight: 500; line-height: 1.4; }
    .claim-reasoning-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 10px 14px; font-size: 12px; line-height: 1.6; color: var(--text-dim); position: relative; }
    .claim-reasoning-box::before { content: 'LLM REASONING'; position: absolute; top: -7px; left: 10px; font-family: var(--font-mono); font-size: 8px; background: var(--surface2); padding: 0 6px; color: var(--text-faint); letter-spacing: 1px; }

    * { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
    @media (max-width: 600px) { #ai-text { font-size: 64px; } #ball-wrap, #ball-wrap svg { width: 60px; height: 60px; } :root { --panel-w: 100vw; } }
  </style>
</head>
<body>
<div id="shell">
  <header id="topbar">
    <button id="eval-btn" onclick="startEval()" title="Run automated evaluation on test set">
      <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
      RUN EVAL
    </button>
    <div id="status-label">INITIALISING</div>
    <div id="status-dot"></div>
  </header>

  <main id="main">
    <div id="chat-col">
      <div id="convo">
        <div id="welcome">
          <div id="logo-lockup">
            <div id="ball-wrap">
              <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <defs>
                  <radialGradient id="ballGrad" cx="38%" cy="35%" r="60%"><stop offset="0%" stop-color="#f5a94e"/><stop offset="55%" stop-color="#e8872a"/><stop offset="100%" stop-color="#7a3a06"/></radialGradient>
                  <radialGradient id="specular" cx="35%" cy="30%" r="30%"><stop offset="0%" stop-color="rgba(255,255,255,.22)"/><stop offset="100%" stop-color="rgba(255,255,255,0)"/></radialGradient>
                  <clipPath id="ballClip"><circle cx="50" cy="50" r="46"/></clipPath>
                </defs>
                <circle cx="50" cy="50" r="46" fill="url(#ballGrad)"/>
                <g clip-path="url(#ballClip)" fill="none" stroke="#7a3a06" stroke-width="2.4" stroke-linecap="round">
                  <path d="M50 4 Q62 50 50 96"/><path d="M50 4 Q38 50 50 96"/>
                  <path d="M4 50 Q50 62 96 50"/><path d="M4 50 Q50 38 96 50"/>
                </g>
                <circle cx="50" cy="50" r="46" fill="url(#specular)"/>
              </svg>
              <div id="ball-shadow"></div>
            </div>
            <div id="ai-text">AI</div>
          </div>
          <div class="tagline">Ask anything about NBA &amp; FIBA rules, tactics, or strategy.</div>
        </div>
      </div>
      <div id="input-bar">
        <div id="input-wrap">
          <textarea id="query-input" rows="1" placeholder="Ask a question about basketball rules or strategy…"></textarea>
          <button id="send-btn" onclick="sendQuery()" title="Send (Enter)">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          </button>
        </div>
        <div id="hint">Enter to send &nbsp;·&nbsp; Shift+Enter for new line</div>
      </div>
    </div>
  </main>
</div>

<div id="panel-backdrop" onclick="closePanel()"></div>
<div id="source-panel">
  <div id="panel-header">
    <div id="panel-title">SOURCE</div>
    <button id="panel-close" onclick="closePanel()">✕</button>
  </div>
  <div id="panel-tabs">
    <div class="p-tab active" data-tab="info" onclick="switchTab('info')">INFO</div>
    <div class="p-tab"        data-tab="text" onclick="switchTab('text')">FULL TEXT</div>
  </div>
  <div id="panel-body">
    <div id="pane-info" class="active">
      <div class="info-block"><div class="info-label">Source</div><div class="info-value" id="p-label">—</div></div>
      <div class="score-row">
        <div class="score-block"><div class="info-label">CrossEncoder</div><div class="score-num" id="p-ce">—</div><div class="score-bar-wrap"><div class="score-bar" id="p-ce-bar" style="width:0%"></div></div></div>
        <div class="score-block"><div class="info-label">RRF Score</div><div class="score-num" id="p-rrf">—</div><div class="score-bar-wrap"><div class="score-bar" id="p-rrf-bar" style="width:0%"></div></div></div>
      </div>
      <div class="info-block"><div class="info-label">Chunk ID</div><div class="info-value mono" id="p-id">—</div></div>
      <div class="info-block"><div class="info-label">Preview</div><div class="info-value" id="p-preview" style="font-size:12.5px;color:var(--text-dim);font-style:italic">—</div></div>
    </div>
    <div id="pane-text"><div class="chunk-text-box" id="p-fulltext"></div></div>
  </div>
  <div id="panel-nav">
    <button class="nav-btn" id="nav-prev" onclick="navigateSource(-1)">← PREV</button>
    <span id="nav-counter">— / —</span>
    <button class="nav-btn" id="nav-next" onclick="navigateSource(+1)">NEXT →</button>
  </div>
</div>

<div id="eval-modal-wrap">
  <div id="eval-modal">
    <div id="eval-modal-header">
      <div id="eval-modal-title">AUTOMATED EVALUATION</div>
      <button id="eval-modal-close" onclick="closeEvalModal()" disabled>✕</button>
    </div>
    <div id="eval-progress-bar-wrap"><div id="eval-progress-bar"></div></div>
    <div id="eval-current">
      <div id="eval-spinner"></div>
      <div id="eval-current-text">Initialising…</div>
      <div id="eval-current-counter"></div>
    </div>
    <div id="eval-results-area"></div>
    <div id="eval-summary">
      <div class="summary-stat">
        <div class="summary-stat-label">Avg Faithfulness</div>
        <div class="summary-stat-val" id="sum-faith" style="color:var(--green)">—</div>
      </div>
      <div class="summary-sep"></div>
      <div class="summary-stat">
        <div class="summary-stat-label">Avg Relevancy</div>
        <div class="summary-stat-val" id="sum-rel" style="color:var(--accent)">—</div>
      </div>
      <div class="summary-sep"></div>
      <div class="summary-note" id="sum-note">—</div>
    </div>
  </div>
</div>

<div id="claims-popup-wrap">
  <div id="claims-popup">
    <div id="claims-popup-header">
      <div id="claims-popup-title">FAITHFULNESS ANALYSIS</div>
      <button id="claims-popup-close" onclick="closeClaimsPopup()">✕</button>
    </div>
    <div id="claims-popup-body"></div>
  </div>
</div>

<script>
  const convo     = document.getElementById('convo');
  const welcome   = document.getElementById('welcome');
  const input     = document.getElementById('query-input');
  const sendBtn   = document.getElementById('send-btn');
  const evalBtn   = document.getElementById('eval-btn');
  const statusDot = document.getElementById('status-dot');
  const statusLbl = document.getElementById('status-label');
  let busy = false, evalOpen = false;
  let panelSources = [], panelIndex = 0, activeTab = 'info';
  let evalResultCount = 0, evalTotal = 0;

  async function checkHealth() {
    try { const r = await fetch('/api/health'); setStatus(r.ok ? 'ready' : 'error', r.ok ? 'READY' : 'ERROR'); }
    catch { setStatus('error', 'OFFLINE'); }
  }
  checkHealth();
  function setStatus(cls, label) { statusDot.className = ''; statusDot.classList.add(cls); statusLbl.textContent = label; }
  input.addEventListener('input', () => { input.style.height = 'auto'; input.style.height = Math.min(input.scrollHeight, 120) + 'px'; });
  input.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendQuery(); } });
  document.addEventListener('keydown', e => { 
    if (e.key === 'Escape') { 
      closePanel(); 
      if (evalOpen) closeEvalModal();
      closeClaimsPopup();
    } 
  });

  async function sendQuery() {
    const query = input.value.trim();
    if (!query || busy) return;
    busy = true; sendBtn.disabled = true; evalBtn.disabled = true; setStatus('busy', 'THINKING');
    if (welcome) welcome.style.display = 'none';

    const turn = document.createElement('div');
    turn.className = 'turn';
    turn.innerHTML = `<div class="turn-query">${escHtml(query)}</div>
      <div class="turn-answer" id="answer-loading">
        <div class="skeleton-line" style="width:92%"></div>
        <div class="skeleton-line" style="width:78%"></div>
        <div class="skeleton-line" style="width:85%"></div>
        <div class="skeleton-line" style="width:60%"></div>
      </div>`;
    convo.appendChild(turn); scrollDown();
    input.value = ''; input.style.height = 'auto';

    try {
      const res = await fetch('/api/ask', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query, top_k: 5, evaluate: true }),
      });
      if (!res.ok) { const err = await res.json().catch(() => ({ detail: res.statusText })); throw new Error(err.detail || 'Server error'); }
      const data = await res.json();
      const sources = data.sources || [];

      const answerEl = turn.querySelector('#answer-loading');
      answerEl.removeAttribute('id');
      answerEl.innerHTML = formatAnswer(data.answer);

      if (sources.length) {
        const wrap = document.createElement('div'); wrap.className = 'source-chips';
        sources.forEach((src, i) => {
          const chip = document.createElement('button'); chip.className = 'source-chip';
          chip.innerHTML = `<span class="chip-num">S${src.index}</span><span class="chip-label">${escHtml(truncate(src.label, 36))}</span>`;
          chip.addEventListener('click', () => openPanel(sources, i, turn));
          wrap.appendChild(chip);
        });
        turn.appendChild(wrap); turn._sources = sources;
      }

      if (data.faithfulness && data.relevancy) {
        const fScore = data.faithfulness.score, rScore = data.relevancy.score;
        const strip = document.createElement('div'); strip.className = 'eval-strip';
        
        const fCard = document.createElement('div');
        fCard.className = 'eval-card clickable';
        fCard.innerHTML = `
            <div class="eval-card-label">Faithfulness</div>
            <div class="eval-card-score ${scoreClass(fScore)}">${(fScore*100).toFixed(0)}%</div>
            <div class="eval-card-sub">${data.faithfulness.supported_count} / ${data.faithfulness.total} claims supported</div>
            <div class="eval-bar-wrap"><div class="eval-bar ${scoreClass(fScore)}" style="width:${(fScore*100).toFixed(1)}%"></div></div>
        `;
        fCard.onclick = () => openClaimsPopup(data.faithfulness.claims);

        const rCard = document.createElement('div');
        rCard.className = 'eval-card';
        rCard.innerHTML = `
            <div class="eval-card-label">Relevancy</div>
            <div class="eval-card-score ${scoreClass(rScore)}">${rScore.toFixed(3)}</div>
            <div class="eval-card-sub">mean cosine similarity (0–1)</div>
            <div class="eval-bar-wrap"><div class="eval-bar ${scoreClass(rScore)}" style="width:${(rScore*100).toFixed(1)}%"></div></div>
        `;

        strip.appendChild(fCard);
        strip.appendChild(rCard);
        turn.appendChild(strip);
      }

      const meta = document.createElement('div'); meta.className = 'turn-meta';
      meta.innerHTML = `<span><span class="dot"></span>Retrieval ${data.retrieval_ms}ms</span>
        <span><span class="dot"></span>Generation ${data.generation_ms}ms</span>
        ${data.eval_ms ? `<span><span class="dot"></span>Eval ${data.eval_ms}ms</span>` : ''}
        <span><span class="dot"></span>${sources.length} sources</span>`;
      turn.appendChild(meta);
      setStatus('ready', 'READY');
    } catch (err) {
      const el = turn.querySelector('#answer-loading') || turn.querySelector('.turn-answer');
      if (el) el.innerHTML = `<span style="color:var(--red)">Error: ${escHtml(err.message)}</span>`;
      setStatus('error', 'ERROR');
    }
    busy = false; sendBtn.disabled = false; evalBtn.disabled = false; scrollDown();
  }

  function scoreClass(s) { return s >= 0.75 ? 'good' : s >= 0.4 ? 'mid' : 'poor'; }
  function formatAnswer(text) {
    // 1. Escape HTML first for security
    let formatted = escHtml(text);
    
    // 2. Convert Markdown bold to HTML strong tags
    formatted = formatted.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    
    // 3. Format citations (Handles multiple sources in one bracket)
    // First, find everything inside brackets: [ ... ]
    formatted = formatted.replace(/\[([^\]]+)\]/g, (match, inner) => {
      
      // If the text inside the brackets contains the word "Source"
      if (/Source/i.test(inner)) {
        
        // Find EVERY "Source N" inside those brackets and turn it into a button
        let buttonized = inner.replace(/Sources?\s?(\d+)/gi, (m, n) => {
          const idx = parseInt(n, 10) - 1;
          return `<span class="cite" data-src-idx="${idx}" onclick="openPanelFromCite(event,${idx})">[Source ${n}]</span>`;
        });
        
        // Return the new buttons (and any extra text like ", Section II") 
        return buttonized; 
      }
      
      // If it's not a citation, leave the brackets alone
      return match;
    });
    
    return formatted;
  }
  function openPanelFromCite(event, idx) {
    const turn = event.target.closest('.turn');
    if (!turn || !turn._sources) return;
    openPanel(turn._sources, idx, turn);
  }

  function openPanel(sources, idx, turn) {
    panelSources = sources; panelIndex = Math.max(0, Math.min(idx, sources.length-1));
    turn._sources = sources; renderPanelSource(); syncActiveStyles(turn);
    document.getElementById('panel-backdrop').classList.add('open');
    document.getElementById('source-panel').classList.add('open');
  }
  function closePanel() {
    document.getElementById('panel-backdrop').classList.remove('open');
    document.getElementById('source-panel').classList.remove('open');
    clearActiveStyles();
  }
  function navigateSource(delta) {
    panelIndex = Math.max(0, Math.min(panelIndex+delta, panelSources.length-1));
    renderPanelSource();
    for (const t of convo.querySelectorAll('.turn')) { if (t._sources === panelSources) { syncActiveStyles(t); break; } }
  }
  function renderPanelSource() {
    const src = panelSources[panelIndex]; if (!src) return;
    document.getElementById('nav-counter').textContent = `${panelIndex+1} / ${panelSources.length}`;
    document.getElementById('nav-prev').disabled = panelIndex === 0;
    document.getElementById('nav-next').disabled = panelIndex === panelSources.length-1;
    document.getElementById('panel-title').textContent = `SOURCE ${src.index}`;
    document.getElementById('p-label').textContent   = src.label || '—';
    document.getElementById('p-id').textContent      = `chunk_${src.index}`;
    document.getElementById('p-preview').textContent = truncate(src.text, 180);
    const ce = src.cross_encoder_score ?? 0;
    document.getElementById('p-ce').textContent = ce.toFixed(3);
    document.getElementById('p-ce-bar').style.width = Math.max(0,Math.min(100,((ce+10)/20)*100)) + '%';
    const rrf = src.rrf_score ?? 0;
    document.getElementById('p-rrf').textContent = rrf.toFixed(4);
    document.getElementById('p-rrf-bar').style.width = Math.max(0,Math.min(100,(rrf/0.06)*100)) + '%';
    document.getElementById('p-fulltext').textContent = src.text || '—';
    switchTab(activeTab, false);
  }
  function syncActiveStyles(turn) {
    clearActiveStyles();
    turn.querySelectorAll('.source-chip').forEach((c,i) => c.classList.toggle('active', i===panelIndex));
    turn.querySelectorAll('.cite').forEach(c => c.classList.toggle('active', parseInt(c.dataset.srcIdx,10)===panelIndex));
  }
  function clearActiveStyles() { document.querySelectorAll('.source-chip.active,.cite.active').forEach(e=>e.classList.remove('active')); }
  function switchTab(tab, save=true) {
    if (save) activeTab = tab;
    document.querySelectorAll('.p-tab').forEach(t => t.classList.toggle('active', t.dataset.tab===tab));
    document.getElementById('pane-info').style.display = tab==='info' ? 'flex'  : 'none';
    document.getElementById('pane-text').style.display = tab==='text' ? 'block' : 'none';
    document.getElementById('pane-info').classList.toggle('active', tab==='info');
    document.getElementById('pane-text').classList.toggle('active', tab==='text');
  }

  async function startEval() {
    if (busy) return;
    busy = true; evalBtn.disabled = true; sendBtn.disabled = true; setStatus('busy', 'EVALUATING');
    openEvalModal();
    evalResultCount = 0; evalTotal = 0;
    document.getElementById('eval-results-area').innerHTML = '';
    document.getElementById('eval-summary').classList.remove('show');
    document.getElementById('eval-progress-bar').style.width = '0%';
    document.getElementById('eval-spinner').className = '';
    document.getElementById('eval-current-text').textContent = 'Connecting…';
    document.getElementById('eval-current-counter').textContent = '';
    document.getElementById('eval-modal-close').disabled = true;

    try {
      const evtSource = new EventSource('/api/evaluate');
      evtSource.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        if (msg.type === 'start') {
          evalTotal = msg.total;
          document.getElementById('eval-current-text').textContent = `Starting — ${msg.total} queries in the test set`;
        }
        else if (msg.type === 'progress') {
          const pct = Math.round((msg.index / evalTotal) * 100);
          document.getElementById('eval-progress-bar').style.width = pct + '%';
          document.getElementById('eval-current-text').textContent = msg.query;
          document.getElementById('eval-current-counter').textContent = `${msg.index+1} / ${evalTotal}`;
          document.getElementById('eval-spinner').className = '';
        }
        else if (msg.type === 'result') {
          evalResultCount++;
          appendEvalResult(msg);
          document.getElementById('eval-progress-bar').style.width = Math.round((evalResultCount/evalTotal)*100) + '%';
          document.getElementById('eval-results-area').lastElementChild?.scrollIntoView({behavior:'smooth',block:'nearest'});
        }
        else if (msg.type === 'summary') {
          document.getElementById('eval-progress-bar').style.width = '100%';
          document.getElementById('eval-spinner').className = 'done';
          document.getElementById('eval-current-text').textContent = 'Evaluation complete.';
          document.getElementById('eval-current-counter').textContent = `${evalTotal} / ${evalTotal}`;
          const fc = scoreClass(msg.avg_faithfulness), rc = scoreClass(msg.avg_relevancy);
          document.getElementById('sum-faith').textContent = (msg.avg_faithfulness*100).toFixed(1)+'%';
          document.getElementById('sum-faith').style.color = `var(--${fc==='good'?'green':fc==='mid'?'yellow':'red'})`;
          document.getElementById('sum-rel').textContent   = msg.avg_relevancy.toFixed(3);
          document.getElementById('sum-rel').style.color   = `var(--${rc==='good'?'green':rc==='mid'?'yellow':'red'})`;
          document.getElementById('sum-note').textContent  = `Averaged across ${msg.results.length} queries in the test set.`;
          document.getElementById('eval-summary').classList.add('show');
          document.getElementById('eval-modal-close').disabled = false;
          evtSource.close();
          busy = false; evalBtn.disabled = false; sendBtn.disabled = false; setStatus('ready','READY');
        }
        else if (msg.type === 'error') { appendEvalError(msg); }
      };
      evtSource.onerror = () => {
        evtSource.close();
        document.getElementById('eval-current-text').textContent = 'Stream error — check server logs.';
        document.getElementById('eval-modal-close').disabled = false;
        busy = false; evalBtn.disabled = false; sendBtn.disabled = false; setStatus('error','ERROR');
      };
    } catch(err) {
      document.getElementById('eval-current-text').textContent = `Error: ${err.message}`;
      document.getElementById('eval-modal-close').disabled = false;
      busy = false; evalBtn.disabled = false; sendBtn.disabled = false; setStatus('error','ERROR');
    }
  }

  function openEvalModal()  { evalOpen = true;  document.getElementById('eval-modal-wrap').classList.add('open'); }
  function closeEvalModal() { evalOpen = false; document.getElementById('eval-modal-wrap').classList.remove('open'); }

  function appendEvalResult(msg) {
    const area = document.getElementById('eval-results-area');
    const row  = document.createElement('div'); row.className = 'eval-row';
    let claimsHtml = '';
    if (msg.claims?.length) {
      claimsHtml = `<div class="eval-mini-label" style="cursor:pointer; text-decoration: underline;" onclick='openClaimsPopup(${JSON.stringify(msg.claims)})'>View Claims & Reasons (${msg.claims.filter(c=>c.supported).length}/${msg.claims.length} supported)</div>`;
    }
    let questionsHtml = '';
    if (msg.questions?.length) {
      questionsHtml = `<div class="eval-mini-label">Generated questions (cosine sim to original query)</div>`;
      msg.questions.forEach(q => { questionsHtml += `<div class="eval-question-row"><span>${escHtml(q.question)}</span><span class="eval-question-sim">${q.similarity.toFixed(3)}</span></div>`; });
    }
    row.innerHTML = `
      <div class="eval-row-header" onclick="this.nextElementSibling.classList.toggle('open')">
        <span class="eval-row-num">Q${msg.index+1}</span>
        <span class="eval-row-query">${escHtml(msg.query)}</span>
        <span class="eval-score-badge faith">F ${(msg.faithfulness*100).toFixed(0)}%</span>
        <span class="eval-score-badge rel">R ${msg.relevancy.toFixed(3)}</span>
      </div>
      <div class="eval-row-body">
        <div class="eval-mini-label">Answer</div>
        <div class="eval-row-answer">${escHtml(truncate(msg.answer,320))}</div>
        ${claimsHtml}${questionsHtml}
      </div>`;
    area.appendChild(row);
  }

  function appendEvalError(msg) {
    const area = document.getElementById('eval-results-area');
    const row  = document.createElement('div'); row.className = 'eval-row';
    row.innerHTML = `<div class="eval-row-header"><span class="eval-row-num" style="border-color:var(--red);color:var(--red)">ERR</span><span class="eval-row-query">${escHtml(msg.query)}</span><span style="font-family:var(--font-mono);font-size:10px;color:var(--red)">${escHtml(msg.message)}</span></div>`;
    area.appendChild(row);
  }

  function openClaimsPopup(claims) {
    const body = document.getElementById('claims-popup-body');
    body.innerHTML = '';
    
    claims.forEach((c, idx) => {
        const item = document.createElement('div');
        item.className = 'claim-detail-item';
        const badgeClass = c.supported ? 'supported' : 'not-supported';
        const badgeIcon = c.supported ? '✓' : '✗';
        
        item.innerHTML = `
            <div class="claim-badge ${badgeClass}">${badgeIcon}</div>
            <div class="claim-content">
                <div class="claim-text-main">${escHtml(c.claim)}</div>
                <div class="claim-reasoning-box">${escHtml(c.reasoning || 'No specific reasoning provided.')}</div>
            </div>
        `;
        body.appendChild(item);
    });

    document.getElementById('claims-popup-wrap').classList.add('open');
  }

  function closeClaimsPopup() {
    document.getElementById('claims-popup-wrap').classList.remove('open');
  }

  function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function truncate(s, n) { return s && s.length > n ? s.slice(0,n)+'…' : s; }
  function scrollDown() { convo.scrollTo({ top: convo.scrollHeight, behavior: 'smooth' }); }
</script>
</body>
</html>
